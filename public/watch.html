<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Online - Streamfit</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
    <!-- Meta tag to block crawler indexing -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Plyr CSS for premium video player -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css?v=3.3">
    
    <style>
        /* Specific full screen layout for cinema page */
        body.watch-page-body {
            background-color: #0b0c0e !important;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cinema-player-container {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            position: relative;
        }
        .cinema-player-container .player-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 0 !important;
            box-shadow: none !important;
        }
        .cinema-player-container .plyr {
            height: 100% !important;
            width: 100% !important;
        }
        .cinema-player-container video {
            height: 100% !important;
            width: 100% !important;
            object-fit: contain;
        }
    </style>
</head>
<body class="watch-page-body">
 
    <div class="cinema-player-container">
        <!-- Main Video Player Wrapper -->
        <div class="player-wrapper">
            <!-- Player Loading Overlay -->
            <div class="player-loader-overlay" id="playerLoaderOverlay">
                <div class="player-spinner"></div>
                <span>Loading stream...</span>
            </div>
            
            <!-- Netflix-style top control bar overlay -->
            <div class="player-header-overlay" id="playerHeaderOverlay">
                <button class="player-back-btn" onclick="window.history.back()"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="player-title-info">
                    <span id="playerMediaCategory">Streaming</span>
                    <h2 id="playerMediaTitle">Title</h2>
                </div>
            </div>
            
            <!-- Premium Video Player -->
            <video id="player" playsinline controls autoplay></video>
            
            <!-- Seek Gesture Feedback Overlays -->
            <div class="seek-feedback seek-feedback-left" id="seekFeedbackLeft">
                <div class="seek-icon-circle">
                    <i class="fa-solid fa-backward"></i>
                    <span>-10s</span>
                </div>
            </div>
            <div class="seek-feedback seek-feedback-right" id="seekFeedbackRight">
                <div class="seek-icon-circle">
                    <i class="fa-solid fa-forward"></i>
                    <span>+10s</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Plyr Library JS -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <!-- Hls.js library for m3u8 playback support -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <!-- App Logic Script -->
    <script src="app.js?v=3.3"></script>
</body>
</html>
