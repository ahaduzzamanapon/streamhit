<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scraper Logs - Streamfit</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }
        h1 { margin: 0; font-size: 1.5rem; color: #38bdf8; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .status {
            font-size: 0.875rem;
            padding: 4px 12px;
            border-radius: 9999px;
            background-color: #1e293b;
        }
        .status.online { background-color: #065f46; color: #34d399; }
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background-color: #7dd3fc; }
        #log-container {
            background-color: #020617;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            height: 70vh;
            overflow-y: auto;
            font-family: 'Cascadia Code', 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #334155; padding-left: 8px; }
        .log-error { color: #f87171; border-color: #ef4444; }
        .log-success { color: #4ade80; border-color: #22c55e; }
        .log-info { color: #38bdf8; border-color: #0ea5e9; }
        .log-warning { color: #fbbf24; border-color: #f59e0b; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Streamfit Scraper Live Monitor</h1>
            <div class="controls">
                <span id="update-status" class="status">Idle</span>
                <button onclick="fetchLogs()">Refresh Now</button>
                <label>
                    <input type="checkbox" id="auto-scroll" checked> Auto-scroll
                </label>
            </div>
        </header>
        <div id="log-container">Loading logs...</div>
    </div>

    <script>
        const logContainer = document.getElementById('log-container');
        const updateStatus = document.getElementById('update-status');
        const autoScrollCheck = document.getElementById('auto-scroll');
        let lastLogContent = "";

        async function fetchLogs() {
            updateStatus.textContent = "Updating...";
            updateStatus.className = "status online";
            
            try {
                const response = await fetch('/api/read-log?file=scraper.log');
                const data = await response.json();
                
                if (data.status === 'success') {
                    if (data.log !== lastLogContent) {
                        const lines = data.log.split('\n');
                        logContainer.innerHTML = '';
                        
                        lines.forEach(line => {
                            if (!line.trim()) return;
                            const div = document.createElement('div');
                            div.className = 'log-entry';
                            
                            if (line.includes('[Scraper]')) div.classList.add('log-info');
                            if (line.includes('Error') || line.includes('Failed')) div.classList.add('log-error');
                            if (line.includes('Successfully') || line.includes('done')) div.classList.add('log-success');
                            if (line.includes('Warning') || line.includes('Retrying')) div.classList.add('log-warning');
                            
                            div.textContent = line;
                            logContainer.appendChild(div);
                        });
                        
                        lastLogContent = data.log;
                        
                        if (autoScrollCheck.checked) {
                            logContainer.scrollTop = logContainer.scrollHeight;
                        }
                    }
                    updateStatus.textContent = "Live";
                } else {
                    logContainer.innerHTML = `<div class="log-error">Error: ${data.message}</div>`;
                    updateStatus.textContent = "Error";
                    updateStatus.className = "status";
                }
            } catch (err) {
                logContainer.innerHTML = `<div class="log-error">Fetch failed: ${err.message}</div>`;
                updateStatus.textContent = "Offline";
                updateStatus.className = "status";
            }
        }

        // Initial fetch
        fetchLogs();
        
        // Auto-refresh every 5 seconds
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
